# ============================================================
# HyFormer-Large on KuaiVideo_x1
# ByteDance HyFormer (arXiv:2601.12681)
# chunk_size=10 -> NS tokens=20, query tokens=12, boosting tokens=32.
# ============================================================

data:
  dataset_id: "kuaivideo_x1"
  use_pretrained_emb: true
  data_dir: "KuaiVideo_x1"
  cache_version: "bars_remap_v1"
  seq_padding: "pre"
  use_bars_feature_encoder: true
  min_categr_count: 10
  train_file: "train.csv"
  test_file: "test.csv"
  item_emb_file: "item_visual_emb_dim64.h5"
  user_col: "user_id"
  item_col: "item_id"
  label_col: "is_click"
  cate_col: null
  pos_item_col: "pos_items"
  neg_item_col: "neg_items"
  pos_cate_col: null
  neg_cate_col: null
  num_users: 10002
  num_items: 3242316
  item_hash_size: 632406
  raw_item_hash_size: 3242317
  item_vis_dim: 64
  max_seq_len: 100
  embedding_regularizer: 1.0e-4

embedding:
  user_emb_dim: 64
  item_emb_dim: 64

model:
  arch: "hyformer"
  chunk_size: 10
  hidden_dim: 1536
  num_layers: 4
  num_heads: 24
  num_query_tokens: 12
  ffn_expansion: 4
  seq_ffn_expansion: 2
  dropout: 0.0
  din_hidden_units: [256, 128]
  output_head_units: [1024, 512, 256]
  head_activation: "Dice"
  head_dropout: 0.1

training:
  batch_size: 512
  learning_rate: 2.0e-4
  weight_decay: 0.0
  num_epochs: 100
  grad_clip_norm: 10.0
  optimizer: "adam"
  scheduler: "reduce_lr_on_plateau"
  reduce_lr_on_plateau: true
  lr_decay_factor: 0.1
  scheduler_eta_min: 1.0e-6
  gradient_accumulation_steps: 8
  gradient_checkpointing: true
  early_stop_patience: 2

logging:
  log_interval: 100
  eval_samples: 0
  save_path: "hyformer_large_kuaivideo.pt"
  save_best: true

seed: 42
device: "auto"

wandb:
  project: "rankmixer"
  tags: ["hyformer", "large"]

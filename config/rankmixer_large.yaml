# ============================================================
# RankMixer-Large on KuaiVideo_x1
# 对应论文 arXiv:2507.15551 RankMixer-1B 配置
#
# 论文配置: T=32, D=1536, L=2, k=4, 全 Dense
# chunk_size=10 → T = 320/10 = 32, D=1536, D/T=48
# (total_dim = 64*4 + 64(DIN seq) = 320)
# 理论参数量: 2*k*L*T*D² = 2*4*2*32*1536² ≈ 1.21B
#
# 注意: 此配置参数量 ~1.2B, 需要足够显存 (建议 ≥24GB)
# ============================================================

# --- 数据配置 ---
data:
  data_dir: "KuaiVideo_x1"
  train_file: "train.csv"
  test_file: "test.csv"
  user_emb_file: "user_visual_emb_dim64.h5"
  item_emb_file: "item_visual_emb_dim64.h5"
  num_users: 10000
  num_items: 3242316
  item_hash_size: 500000
  user_vis_dim: 64
  item_vis_dim: 64
  max_seq_len: 20

# --- 特征 Embedding 配置 ---
embedding:
  user_emb_dim: 64
  item_emb_dim: 64

# --- RankMixer 模型配置 ---
# 论文 RankMixer-1B: 全 Dense 架构, L=2
model:
  arch: "rankmixer"
  chunk_size: 10                         # d → T=32
  hidden_dim: 1536                       # D
  num_dense_layers: 2                    # L=2 (全 Dense)
  num_moe_layers: 0                      # 无 MoE
  ffn_expansion: 4                       # k
  num_experts: 8                         # (不生效)
  l1_lambda: 0.01                        # (不生效)

# --- 训练配置 ---
training:
  batch_size: 1024
  learning_rate: 3.0e-4
  weight_decay: 1.0e-5
  num_epochs: 100
  grad_clip_norm: 1.0
  optimizer: "adamw"
  scheduler: "cosine"
  scheduler_eta_min: 1.0e-6
  warmup_steps: 1000
  early_stop_patience: 5

# --- 日志与评估配置 ---
logging:
  log_interval: 100
  eval_samples: 500000
  save_path: "rankmixer_large_kuaivideo.pt"
  save_best: true

# --- 设备配置 ---
device: "auto"

# --- wandb 配置 ---
wandb:
  project: "rankmixer"
  tags: ["rankmixer", "large", "dense"]

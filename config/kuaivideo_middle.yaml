# ============================================================
# RankMixer-Middle on KuaiVideo_x1
# 介于论文 RankMixer-100M 和 RankMixer-1B 之间的中等配置
#
# 配置: T=16, D=1024, L=2 (dense) + 1 (moe, E=4), k=4
#   chunk_size=16 → T = 256/16 = 16
#   hidden_dim=1024 → D/T = 64
#   理论 Dense 参数量: 2*4*2*16*1024² ≈ 268M
#   理论 MoE 参数量:   2*4*1*16*1024²*4 ≈ 537M (稀疏激活)
# ============================================================

# --- 数据配置 ---
data:
  data_dir: "KuaiVideo_x1 2"
  train_file: "train.csv"
  test_file: "test.csv"
  user_emb_file: "user_visual_emb_dim64.h5"
  item_emb_file: "item_visual_emb_dim64.h5"
  num_users: 10000
  num_items: 3242316
  item_hash_size: 500000
  user_vis_dim: 64
  item_vis_dim: 64

# --- 特征 Embedding 配置 ---
embedding:
  user_emb_dim: 64
  item_emb_dim: 64

# --- RankMixer 模型配置 ---
# 总特征维度 = 64 + 64 + 64 + 64 = 256
# chunk_size=16 → T = 256/16 = 16
# hidden_dim=1024, D/T = 1024/16 = 64
model:
  chunk_size: 16                         # d: token 切分维度 → T=16
  hidden_dim: 1024                       # D: 隐藏维度
  num_dense_layers: 2                    # L_dense: 论文推荐 L=2
  num_moe_layers: 1                      # L_moe: 加入 1 层 Sparse-MoE
  ffn_expansion: 4                       # k: FFN 扩展倍率
  num_experts: 4                         # E: 每个 token 的专家数
  l1_lambda: 0.01                        # λ: MoE L1 稀疏正则系数

# --- 训练配置 ---
training:
  batch_size: 2048
  learning_rate: 3.0e-4
  weight_decay: 1.0e-5
  num_epochs: 5
  grad_clip_norm: 1.0
  optimizer: "adamw"
  scheduler: "cosine"
  scheduler_eta_min: 1.0e-6
  warmup_steps: 500

# --- 日志与评估配置 ---
logging:
  log_interval: 200
  eval_samples: 500000
  save_path: "rankmixer_middle_kuaivideo.pt"
  save_best: true

# --- 设备配置 ---
device: "auto"

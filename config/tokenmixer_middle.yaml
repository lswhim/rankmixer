# ============================================================
# TokenMixer-Large Middle on KuaiVideo_x1
# 论文 arXiv:2602.06563, MoE 版本
#
# T=16+1=17, D=544 (544/17=32), L=4, E=8, top_k=2
# Sparse-Pertoken MoE: shared expert + gate scaling
# ============================================================

# --- 数据配置 ---
data:
  data_dir: "KuaiVideo_x1 2"
  train_file: "train.csv"
  test_file: "test.csv"
  user_emb_file: "user_visual_emb_dim64.h5"
  item_emb_file: "item_visual_emb_dim64.h5"
  num_users: 10000
  num_items: 3242316
  item_hash_size: 500000
  user_vis_dim: 64
  item_vis_dim: 64

# --- 特征 Embedding 配置 ---
embedding:
  user_emb_dim: 64
  item_emb_dim: 64

# --- TokenMixer-Large 模型配置 ---
model:
  arch: "tokenmixer_large"
  chunk_size: 16                         # d → T=16, +1 global = 17
  hidden_dim: 544                        # D (544/17=32)
  num_layers: 4                          # L=4
  ffn_expansion: 4                       # n
  use_moe: true                          # MoE 版本
  num_experts: 8                         # E=8
  top_k: 2                              # top-k routing
  gate_scale: 0.0                        # auto: α = E/k = 4
  small_init: true
  inter_residual_interval: 2
  aux_loss_weight: 0.1

# --- 训练配置 ---
training:
  batch_size: 2048
  learning_rate: 3.0e-4
  weight_decay: 1.0e-5
  num_epochs: 5
  grad_clip_norm: 1.0
  optimizer: "adamw"
  scheduler: "cosine"
  scheduler_eta_min: 1.0e-6
  warmup_steps: 500

# --- 日志与评估配置 ---
logging:
  log_interval: 200
  eval_samples: 500000
  save_path: "tokenmixer_middle_kuaivideo.pt"
  save_best: true

# --- 设备配置 ---
device: "auto"

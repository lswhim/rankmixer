# ============================================================
# RankMixer-Small on KuaiVideo_x1
# 对应论文 arXiv:2507.15551 RankMixer-100M 配置
#
# 论文配置: T=16, D=768, L=2, k=4, 全 Dense (无 MoE)
# chunk_size=12 → T = 192/12 = 16, D=768, D/T=48
# (total_dim = 64+64+64(DIN seq) = 192, 不含预训练 vis emb)
# 理论参数量: 2*k*L*T*D² = 2*4*2*16*768² ≈ 150M
# ============================================================

# --- 数据配置 ---
data:
  use_pretrained_emb: false
  data_dir: "KuaiVideo_x1"
  train_file: "train.csv"
  test_file: "test.csv"
  user_emb_file: "user_visual_emb_dim64.h5"
  item_emb_file: "item_visual_emb_dim64.h5"
  num_users: 10000
  num_items: 3242316
  item_hash_size: 500000
  user_vis_dim: 64
  item_vis_dim: 64
  max_seq_len: 20

# --- 特征 Embedding 配置 ---
embedding:
  user_emb_dim: 64
  item_emb_dim: 64

# --- RankMixer 模型配置 ---
# 论文 RankMixer-100M: 全 Dense 架构, L=2
model:
  arch: "rankmixer"
  chunk_size: 12                         # d → T=16
  hidden_dim: 768                        # D
  num_dense_layers: 2                    # L=2 (全 Dense)
  num_moe_layers: 0                      # 无 MoE
  ffn_expansion: 4                       # k
  num_experts: 8                         # (不生效)
  l1_lambda: 0.01                        # (不生效)

# --- 训练配置 ---
training:
  batch_size: 2048
  learning_rate: 5.0e-4
  weight_decay: 1.0e-5
  num_epochs: 100
  grad_clip_norm: 1.0
  optimizer: "adam"
  scheduler: "cosine"
  scheduler_eta_min: 1.0e-6
  warmup_steps: 500
  early_stop_patience: 5

# --- 日志与评估配置 ---
logging:
  log_interval: 200
  eval_samples: 500000
  save_path: "rankmixer_small_kuaivideo.pt"
  save_best: true

# --- 设备配置 ---
device: "auto"

# --- wandb 配置 ---
wandb:
  project: "rankmixer"
  tags: ["rankmixer", "small", "dense"]

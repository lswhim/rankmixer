# ============================================================
# SubMixer Middle on KuaiVideo_x1
# Multi-Subspace Adaptive Token Mixing, MoE 版本
#
# 对标 TokenMixer-Large Middle
# T=16+1=17, D=544 (544/17=32), L=4, E=8, top_k=2
# chunk_size=20 → T = ceil(320/20) = 16, +1 global = 17
# d_latent=136, num_subspaces=4
# Sparse-Pertoken MoE: shared expert + gate scaling
# ============================================================

# --- 数据配置 ---
data:
  use_pretrained_emb: true
  data_dir: "KuaiVideo_x1"
  train_file: "train.csv"
  test_file: "test.csv"
  item_emb_file: "item_visual_emb_dim64.h5"
  num_users: 10000
  num_items: 3242316
  item_hash_size: 3250000
  item_vis_dim: 64
  max_seq_len: 100
  embedding_regularizer: 1.0e-4

# --- 特征 Embedding 配置 ---
embedding:
  user_emb_dim: 64
  item_emb_dim: 64

# --- SubMixer 模型配置 ---
model:
  arch: "submixer"
  chunk_size: 20                         # d → T = ceil(320/20) = 16, +1 global = 17
  hidden_dim: 544                        # D (544/17=32)
  num_layers: 4                          # L=4
  ffn_expansion: 4                       # n
  d_latent: 0                            # auto: D // 4
  num_subspaces: 4                       # H: 记忆子空间数
  use_moe: true                          # MoE 版本
  num_experts: 8                         # E=8
  top_k: 2                              # top-k routing
  gate_scale: 0.0                        # auto: α = E/k = 4
  small_init: true
  inter_residual_interval: 2
  aux_loss_weight: 0.1
  din_hidden_units: [256, 128]
  output_head_units: [256]

# --- 训练配置 ---
training:
  batch_size: 2048
  learning_rate: 3.0e-4
  weight_decay: 1.0e-5
  num_epochs: 100
  grad_clip_norm: 1.0
  optimizer: "adamw"
  scheduler: "cosine"
  scheduler_eta_min: 1.0e-6
  warmup_steps: 500
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  early_stop_patience: 5

# --- 日志与评估配置 ---
logging:
  log_interval: 200
  eval_samples: 0
  save_path: "submixer_middle_kuaivideo.pt"
  save_best: true

# --- 随机种子 ---
seed: 42

# --- 设备配置 ---
device: "auto"

# --- wandb 配置 ---
wandb:
  project: "rankmixer"
  tags: ["submixer", "middle", "moe"]

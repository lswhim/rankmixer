# ============================================================
# Vanilla Transformer-Middle on KuaiVideo_x1
#
# 标准 Transformer 对照组 (中等规模):
# Pre-LN, Multi-Head Self-Attention + FFN (GELU), Mean Pooling
# chunk_size=20 → T = ceil(320/20) = 16, D=1024, L=6, H=16, head_dim=64
# total_dim = 64+64+64+128 = 320 (与 BARS benchmark 对齐: 无 neg_seq)
# ============================================================

# --- 数据配置 ---
data:
  use_pretrained_emb: true
  data_dir: "KuaiVideo_x1"
  train_file: "train.csv"
  test_file: "test.csv"
  item_emb_file: "item_visual_emb_dim64.h5"
  num_users: 10000
  num_items: 3242316
  item_hash_size: 3250000
  item_vis_dim: 64
  max_seq_len: 100
  embedding_regularizer: 1.0e-4

# --- 特征 Embedding 配置 ---
embedding:
  user_emb_dim: 64
  item_emb_dim: 64

# --- Transformer 模型配置 ---
model:
  arch: "transformer"
  chunk_size: 20                         # d → T = ceil(320/20) = 16
  hidden_dim: 1024                       # D
  num_layers: 6                          # L
  num_heads: 16                          # H (head_dim = 64)
  ffn_expansion: 4                       # FFN 扩展倍率
  dropout: 0.0
  din_hidden_units: [256, 128]           # P1: DIN attention MLP 隐藏层
  output_head_units: [1024, 512, 256]    # P3: 预测头 MLP (对齐 DMIN DNN 头)

# --- 训练配置 (与 BARS benchmark 完全对齐) ---
training:
  batch_size: 4096
  learning_rate: 1.0e-3
  weight_decay: 0.0
  num_epochs: 100
  grad_clip_norm: 10.0
  optimizer: "adam"
  scheduler: "reduce_lr_on_plateau"
  reduce_lr_on_plateau: true
  lr_decay_factor: 0.1
  scheduler_eta_min: 1.0e-6
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  early_stop_patience: 2

# --- 日志与评估配置 ---
logging:
  log_interval: 200
  eval_samples: 0
  save_path: "transformer_middle_kuaivideo.pt"
  save_best: true

# --- 随机种子 ---
seed: 42

# --- 设备配置 ---
device: "auto"

# --- wandb 配置 ---
wandb:
  project: "rankmixer"
  tags: ["transformer", "middle"]

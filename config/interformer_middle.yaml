includes:
  - ../data/datasets/kuaivideo.yaml

model:
  arch: "interformer"
  chunk_size: 64
  hidden_dim: 64
  num_layers: 4
  num_heads: 4
  num_nonseq_summary_tokens: 1
  num_cls_tokens: 4
  num_pma_tokens: 2
  num_recent_tokens: 2
  use_neg_sequence: true
  dhen_layers: 2
  dcn_rank: 32
  ffn_expansion: 4
  dropout: 0.0
  din_hidden_units: [512, 256]
  output_head_units: [1024, 512, 256]
  head_activation: "SiLU"
  head_dropout: 0.1
training:
  batch_size: 4096
  learning_rate: 1.0e-3
  weight_decay: 0.0
  num_epochs: 100
  grad_clip_norm: 10.0
  optimizer: "adam"
  monitor: {"gAUC": 1, "AUC": 1}
  reduce_lr_on_plateau: true
  lr_decay_factor: 0.1
  scheduler_eta_min: 1.0e-6
  gradient_accumulation_steps: 1
  gradient_checkpointing: true
  early_stop_patience: 2
logging:
  log_interval: 200
  eval_samples: 0
  save_best: true
seed: 20222023
device: "auto"
wandb:
  project: "rankmixer"
  tags: ["interformer", "middle", "kuaivideo", "bars_aligned"]

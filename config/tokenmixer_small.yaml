# ============================================================
# TokenMixer-Large Small on KuaiVideo_x1
# 论文 arXiv:2602.06563, Dense 版本
#
# 基于 RankMixer-100M 同等规模, 使用 TokenMixer-Large 架构
# T=16+1(global)=17, D=544 (544/17=32), L=4, n=4
# ============================================================

# --- 数据配置 ---
data:
  data_dir: "KuaiVideo_x1 2"
  train_file: "train.csv"
  test_file: "test.csv"
  user_emb_file: "user_visual_emb_dim64.h5"
  item_emb_file: "item_visual_emb_dim64.h5"
  num_users: 10000
  num_items: 3242316
  item_hash_size: 500000
  user_vis_dim: 64
  item_vis_dim: 64
  max_seq_len: 20

# --- 特征 Embedding 配置 ---
embedding:
  user_emb_dim: 64
  item_emb_dim: 64

# --- TokenMixer-Large 模型配置 ---
model:
  arch: "tokenmixer_large"
  chunk_size: 20                         # d → T=16, +1 global = 17
  hidden_dim: 544                        # D (544/17=32)
  num_layers: 4                          # L=4 (可用更深层, 因为有 inter-residual)
  ffn_expansion: 4                       # n
  use_moe: false                         # Dense 版本
  num_experts: 8
  top_k: 2
  gate_scale: 0.0
  small_init: true                       # Down-matrix small init
  inter_residual_interval: 2             # 每 2 层一次跨层残差
  aux_loss_weight: 0.1                   # 辅助损失权重 λ

# --- 训练配置 ---
training:
  batch_size: 2048
  learning_rate: 5.0e-4
  weight_decay: 1.0e-5
  num_epochs: 5
  grad_clip_norm: 1.0
  optimizer: "adamw"
  scheduler: "cosine"
  scheduler_eta_min: 1.0e-6
  warmup_steps: 500

# --- 日志与评估配置 ---
logging:
  log_interval: 200
  eval_samples: 500000
  save_path: "tokenmixer_small_kuaivideo.pt"
  save_best: true

# --- 设备配置 ---
device: "auto"

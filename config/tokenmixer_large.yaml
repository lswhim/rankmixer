# ============================================================
# TokenMixer-Large Large on KuaiVideo_x1
# 论文 arXiv:2602.06563, MoE 版本 (大规模)
#
# T=16+1=17, D=1088 (1088/17=64), L=4, n=4
# chunk_size=20 → T = ceil(320/20) = 16, +1 global = 17
# Sparse-Pertoken MoE: E=8, top_k=2, shared expert + gate scaling
# ============================================================

# --- 数据配置 ---
data:
  dataset_id: "kuaivideo_x1"
  use_pretrained_emb: true
  data_dir: "KuaiVideo_x1"
  cache_version: "bars_remap_v1"
  seq_padding: "pre"
  use_bars_feature_encoder: true
  min_categr_count: 10
  train_file: "train.csv"
  test_file: "test.csv"
  item_emb_file: "item_visual_emb_dim64.h5"
  user_col: "user_id"
  item_col: "item_id"
  label_col: "is_click"
  cate_col: null
  pos_item_col: "pos_items"
  neg_item_col: "neg_items"
  pos_cate_col: null
  neg_cate_col: null
  num_users: 10002
  num_items: 3242316
  item_hash_size: 632406
  raw_item_hash_size: 3242317
  item_vis_dim: 64
  max_seq_len: 100
  embedding_regularizer: 1.0e-4

# --- 特征 Embedding 配置 ---
embedding:
  user_emb_dim: 64
  item_emb_dim: 64

# --- TokenMixer-Large 模型配置 ---
model:
  arch: "tokenmixer_large"
  chunk_size: 28                         # d → T = ceil(320/20) = 16, +1 global = 17
  hidden_dim: 1088                       # D (1088/17=64)
  num_layers: 4                          # L=4
  ffn_expansion: 4                       # n
  use_moe: true                          # MoE 版本
  num_experts: 4                         # E=4
  top_k: 2                              # top-k routing (稀疏比 1:2)
  gate_scale: 0.0                        # auto: α = E/k = 2
  small_init: true                       # Down-matrix small init
  inter_residual_interval: 2             # 每 2 层一次跨层残差
  aux_loss_weight: 0.1                   # 辅助损失权重 λ
  din_hidden_units: [256, 128]           # P1: DIN attention MLP 隐藏层
  output_head_units: [1024, 512, 256]    # P3: 预测头 MLP 隐藏层 (对齐 BARS)
  head_activation: "Dice"                # 对齐 BARS DIN/DMIN
  head_dropout: 0.1                      # 对齐 BARS DIN/DMIN

# --- 训练配置 ---
training:
  batch_size: 1024
  learning_rate: 3.0e-4
  weight_decay: 0.0
  num_epochs: 100
  grad_clip_norm: 1.0
  optimizer: "adam"
  scheduler: "reduce_lr_on_plateau"
  reduce_lr_on_plateau: true
  lr_decay_factor: 0.1
  scheduler_eta_min: 1.0e-6
  gradient_accumulation_steps: 8
  gradient_checkpointing: true
  early_stop_patience: 2

# --- 日志与评估配置 ---
logging:
  log_interval: 100
  eval_samples: 0
  save_path: "tokenmixer_large_kuaivideo.pt"
  save_best: true

# --- 随机种子 ---
seed: 42

# --- 设备配置 ---
device: "auto"

# --- wandb 配置 ---
wandb:
  project: "rankmixer"
  tags: ["tokenmixer_large", "large", "moe"]

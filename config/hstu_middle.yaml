# ============================================================
# HSTU-Middle on KuaiVideo_x1
# 论文: "Actions Speak Louder than Words" (Meta, ICML 2024)
# arXiv:2402.17152
#
# HSTU 核心: 无 Softmax 注意力 + U 门控 + 相对位置偏置
# D=512, num_heads=16, head_dim=32
# 更深的层数 L=8, 参数量约为 Small 的 4 倍
# ============================================================

# --- 数据配置 ---
data:
  use_pretrained_emb: true
  data_dir: "KuaiVideo_x1"
  train_file: "train.csv"
  test_file: "test.csv"
  item_emb_file: "item_visual_emb_dim64.h5"
  num_users: 10000
  num_items: 3242316
  item_hash_size: 3250000
  item_vis_dim: 64
  max_seq_len: 100
  embedding_regularizer: 1.0e-4

# --- 特征 Embedding 配置 ---
embedding:
  user_emb_dim: 64
  item_emb_dim: 64

# --- HSTU 模型配置 ---
model:
  arch: "hstu"
  chunk_size: 16                         # (HSTU 不使用 chunk_size)
  hidden_dim: 512                        # D
  num_layers: 8                          # L
  num_heads: 16                          # H (head_dim = D/H = 32)
  ffn_expansion: 4                       # FFN 扩展倍率
  dropout: 0.0
  output_head_units: [256]               # P3: 预测头 MLP 隐藏层

# --- 训练配置 ---
training:
  batch_size: 2048
  learning_rate: 3.0e-4
  weight_decay: 1.0e-5
  num_epochs: 100
  grad_clip_norm: 1.0
  optimizer: "adamw"
  scheduler: "cosine"
  scheduler_eta_min: 1.0e-6
  warmup_steps: 500
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  early_stop_patience: 5

# --- 日志与评估配置 ---
logging:
  log_interval: 200
  eval_samples: 0
  save_path: "hstu_middle_kuaivideo.pt"
  save_best: true

# --- 设备配置 ---
device: "auto"

# --- wandb 配置 ---
wandb:
  project: "rankmixer"
  tags: ["hstu", "middle"]
